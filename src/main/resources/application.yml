spring:
  application:
    name: transitea

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:transitea_db}
    username: ${DB_USERNAME:transitea}
    password: ${DB_PASSWORD:transitea}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  quartz:
    job-store-type: memory
    scheduler-name: transitea-scheduler
    auto-startup: true
    properties:
      org:
        quartz:
          threadPool:
            threadCount: 5

server:
  port: ${SERVER_PORT:8080}

# Configuration personnalisee de l application
application:
  jwt:
    secret-access: ${JWT_SECRET_ACCESS:dev-secret-access-key-minimum-256-bits-long-xxxxxxxxxx}
    secret-refresh: ${JWT_SECRET_REFRESH:dev-secret-refresh-key-minimum-256-bits-long-xxxxxxxxxx}
    expiration-access-ms: 3600000       # 1 heure
    expiration-refresh-ms: 604800000    # 7 jours

  qrcode:
    cache-repertoire: ${QRCODE_CACHE_PATH:/var/transitea/cache/qrcodes}
    cache-duree-jours: 90

  whatsapp:
    token: ${WHATSAPP_TOKEN:}
    phone-number-id: ${WHATSAPP_PHONE_NUMBER_ID:}
    api-url: https://graph.facebook.com/v18.0

logging:
  level:
    com.transitea: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.hibernate.SQL: ${JPA_SHOW_SQL:false}
